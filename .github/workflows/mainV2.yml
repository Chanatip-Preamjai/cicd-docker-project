name: Python Flask CI/CD

# กำหนดให้ Workflow ทำงานเมื่อมีการ Push โค้ดไปยัง Branch 'main'
on:
  push:
    branches:
      - main

jobs:
  test-python-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Flask==3.0.2 Werkzeug==3.0.1 pytest==8.0.2

      - name: Run Pytest
        run: |
          pytest test_app.py

  build-and-push-docker-image:
    needs: test-python-code # ต้องรอให้ด่านเทสต์ผ่านก่อน ถึงจะทำด่านนี้
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: chisanupongphetruen/testphoto:latest

  deploy:
    needs: build-and-push-docker-image # ต้องรอให้ด่าน Build ผ่านก่อน
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # สคริปต์ที่จะไปรันบนเซิร์ฟเวอร์เพื่อดึง Image ใหม่มาเปิด
          script: |
            docker pull chisanupongphetruen/testphoto:latest
            docker stop goldfish-app || true
            docker rm goldfish-app || true
            # รันแอป Python โดยเชื่อมพอร์ต 80 ของเซิร์ฟเวอร์ เข้ากับพอร์ต 5000 ของ Flask
            docker run -d --name goldfish-app -p 80:5000 chisanupongphetruen/testphoto:latest
